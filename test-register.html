<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Мессенджер</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        input,
        button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background: #007cba;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #005a87;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }

        .section {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <h1>🚀 Тест мессенджера</h1>

    <!-- Регистрация -->
    <div class="section">
        <h2>🔐 Регистрация</h2>
        <form id="registerForm">
            <input name="username" placeholder="Логин" required>
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <!-- Вход -->
    <div class="section">
        <h2>🔑 Вход</h2>
        <form id="loginForm">
            <input name="username" placeholder="Логин или Email" required>
            <input name="password" type="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>

    <!-- Создать чат -->
    <div class="section">
        <h2>💬 Создать чат</h2>
        <form id="chatForm">
            <input name="user_id" placeholder="Ваш ID" required>
            <input name="interlocutor_id" placeholder="ID собеседника" required>
            <button type="submit">Создать чат</button>
        </form>
    </div>

    <!-- Получить чаты -->
    <div class="section">
        <h2>📋 Мои чаты</h2>
        <form id="getChatsForm">
            <input name="user_id" placeholder="Ваш ID" required>
            <button type="submit">Получить чаты</button>
        </form>
    </div>

    <!-- Результат -->
    <div id="result"></div>

    <script>
        const result = document.getElementById('result');

        function showResponse(data) {
            result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        // Регистрация
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('https://service-taxi31.ru/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showResponse(await res.json());
            } catch (err) {
                showResponse({ error: 'Ошибка сети', message: err.message });
            }
        };

        // Вход
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('https://service-taxi31.ru/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showResponse(await res.json());
            } catch (err) {
                showResponse({ error: 'Ошибка сети', message: err.message });
            }
        };

        // Создать чат
        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('https://service-taxi31.ru/api/chats.php?action=create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showResponse(await res.json());
            } catch (err) {
                showResponse({ error: 'Ошибка сети', message: err.message });
            }
        };

        // Получить чаты
        document.getElementById('getChatsForm').onsubmit = async (e) => {
            e.preventDefault();
            const user_id = new FormData(e.target).get('user_id');
            try {
                const res = await fetch(`https://service-taxi31.ru/api/chats.php?action=list&user_id=${user_id}`);
                showResponse(await res.json());
            } catch (err) {
                showResponse({ error: 'Ошибка сети', message: err.message });
            }
        };
    </script>
</body>

</html>
