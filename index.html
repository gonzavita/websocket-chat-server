<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💬 Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Единый стиль — как в Telegram -->
    <link rel="stylesheet" href="css/telegram.css" />
</head>

<body>

    <!-- === Экран входа === -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h1>💬 Messenger</h1>
            <p>Быстро и надёжно</p>

            <form id="loginForm">
                <input type="text" name="username" id="loginPhoneInput" placeholder="Телефон или логин" required />
                <input type="password" name="password" placeholder="Пароль" required />
                <button type="submit">Войти</button>
                <div class="switch-link">Нет аккаунта? <a id="toRegister">Зарегистрироваться</a></div>
            </form>

            <form id="registerForm" style="display:none;">
                <input type="text" name="username" placeholder="Логин" required />
                <div class="feedback" id="usernameFeedback"></div>

                <input type="email" name="email" placeholder="Email" required />
                <input type="tel" name="phone" id="phoneInput" placeholder="+7 (999) 123-45-67" required />
                <div class="feedback" id="phoneFeedback"></div>

                <input type="password" name="password" placeholder="Пароль" required />
                <button type="submit">Регистрация</button>
                <div class="switch-link">Уже есть? <a id="toLogin">Войти</a></div>
            </form>
        </div>
    </div>

    <!-- === Основной интерфейс === -->
    <div class="app" id="chatApp" style="display: none;">
        <!-- Левая панель: чаты -->
        <!-- Левая панель: чаты -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h3>Чаты</h3>
                <span id="logout" class="logout-btn">Выход</span>
            </header>
        
            <div class="search-box">
                <input type="text" id="searchUsers" placeholder="Поиск..." />
            </div>
        
            <!-- 🔽 Результаты поиска -->
            <div class="search-results" id="searchResults"></div>
        
            <!-- Список чатов -->
            <div class="chats-list" id="chatsList">
                <!-- Динамически -->
            </div>
        </aside>


        <!-- Центр: чат -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="avatar" id="currentAvatar">A</div>
                <span id="chatHeader">Выберите чат</span>
            </header>

            <div class="messages" id="messages">
                <!-- Сообщения -->
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." />
                <button id="sendBtn">➤</button>
            </div>
        </main>

        <!-- Правая панель: профиль -->
        <aside class="profile-panel" id="profilePanel">
            <header class="profile-header">
                <button class="close-btn" id="closeProfile">×</button>
                <div class="avatar">👤</div>
                <h3 id="profileName">Профиль</h3>
            </header>

            <div class="profile-body">
                <section class="profile-section">
                    <h4>Аккаунт</h4>
                    <div class="profile-row"><strong>Имя:</strong> <span id="profileFullName">Пользователь</span></div>
                    <div class="profile-row"><strong>Email:</strong> <span id="profileEmail">—</span></div>
                    <div class="profile-row"><strong>Телефон:</strong> <span id="profilePhone">—</span></div>
                </section>

                <section class="profile-section">
                    <h4>Настройки</h4>
                    <label class="toggle-row">
                        Тёмная тема
                        <input type="checkbox" id="themeToggle" />
                        <span class="toggle-slider"></span>
                    </label>
                </section>

                <button class="btn-danger" id="logoutFromProfile">Выйти из аккаунта</button>
            </div>
        </aside>
    </div>

    <!-- Фоны -->
    <div class="overlay-left" id="overlayLeft"></div>
    <div class="overlay-right" id="overlayRight"></div>

    <!-- Подключение Socket.IO клиент -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>



    <!-- Сначала модули -->
    <script src="/js/ui.js" type="module"></script>
    <script src="/js/messages.js" type="module"></script>
    <script src="/js/chats.js" type="module"></script>
    <script src="/js/search.js" type="module"></script>
    
    <!-- Потом обычные скрипты -->
    <script src="/js/auth.js"></script>
    
    <!-- Последним — main.js (модуль) -->
    <script src="/js/main.js" type="module"></script>

    
</body>

</html>
