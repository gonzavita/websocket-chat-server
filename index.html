<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход • Messenger</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#0088cc',
                        'primary-hover': '#007abc'
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.15.8/dist/cdn.min.js"></script>

    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body
    class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-white min-h-screen flex items-center justify-center p-4">

<div x-data="{
    showLogin: true,
    rawPhone: '',

    // Форматированный номер телефона
    get formattedPhone() {
        let v = this.rawPhone.replace(/\D/g, '');
        if (v.startsWith('8') && v.length > 1) v = '7' + v.slice(1);
        else if (!v.startsWith('7')) v = '7' + v;
        v = v.slice(0, 11);

        if (v.length === 0) return '+7 ';
        if (v.length < 4) return `+7 (${v}`;
        if (v.length < 7) return `+7 (${v.slice(1, 4)}) ${v.slice(4)}`;
        if (v.length < 9) return `+7 (${v.slice(1, 4)}) ${v.slice(4, 7)}-${v.slice(7)}`;
        if (v.length < 11) return `+7 (${v.slice(1, 4)}) ${v.slice(4, 7)}-${v.slice(7, 9)}-${v.slice(9)}`;
        return `+7 (${v.slice(1, 4)}) ${v.slice(4, 7)}-${v.slice(7, 9)}-${v.slice(9, 11)}`;
    },

    updateRawPhone(event) {
        const input = event.target.value;
        let digits = input.replace(/\D/g, '');

        if (digits.startsWith('8') && digits.length > 1) {
            digits = '7' + digits.slice(1);
        }
        if (digits && !digits.startsWith('7')) {
            digits = '7' + digits;
        }

        this.rawPhone = digits.slice(0, 11);
    },

    focusInput(el) {
        if (!this.rawPhone) {
            el.value = '+7 ';
            setTimeout(() => {
                el.setSelectionRange(3, 3);
            }, 1);
        }
    },

    // ✅ Вход через /api/login
    async login(event) {
        const form = event.target;
        const data = new FormData(form);
        const payload = Object.fromEntries(data);

        try {
            const res = await fetch('/api/login', {  // 🔥 БЕЗ .php!
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                localStorage.setItem('currentUser', JSON.stringify(result.user));
                alert('Вход выполнен!');
                window.location.href = 'chat.html';
            } else {
                alert('Ошибка: ' + result.error);
            }
        } catch (err) {
            console.error('Ошибка входа:', err);
            alert('Не удалось подключиться к серверу');
        }
    },

    // ✅ Регистрация через /api/register
    async register(event) {
        const form = event.target;
        const username = form.username.value.trim();
        const email = form.email.value.trim();
        const password = form.password.value.trim();

        if (username.length < 3) {
            alert('Логин должен быть не менее 3 символов');
            return;
        }
        if (!email.includes('@')) {
            alert('Некорректный email');
            return;
        }
        if (password.length < 6) {
            alert('Пароль должен быть не менее 6 символов');
            return;
        }

        try {
            const res = await fetch('/api/register', {  // 🔥 БЕЗ .php!
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username,
                    email,
                    phone: this.rawPhone,
                    password
                })
            });
            const result = await res.json();
            if (result.success) {
                alert('Регистрация успешна! Теперь войдите.');
                this.showLogin = true;
                this.rawPhone = '';
            } else {
                alert('Ошибка: ' + result.error);
            }
        } catch (err) {
            console.error('Ошибка регистрации:', err);
            alert('Не удалось подключиться к серверу');
        }
    }
}"

        class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-200 dark:border-gray-700">

        <!-- Заголовок -->
        <div class="text-center py-8 px-6">
            <h1 class="text-3xl font-bold text-primary">💬 Messenger</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Быстро и безопасно</p>
        </div>

        <!-- Форма входа -->
        <form x-show="showLogin" @submit.prevent="login" class="px-6 pb-6 space-y-4 transition-all duration-300">
            <div class="space-y-2">
                <input type="text" name="username" placeholder="Телефон или логин" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <div class="space-y-2">
                <input type="password" name="password" placeholder="Пароль" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <button type="submit"
                class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary-hover active:scale-95 transition-all shadow-md">
                Войти
            </button>
            <div class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
                Нет аккаунта?
                <a @click="showLogin = false"
                    class="text-primary font-medium hover:underline cursor-pointer">Зарегистрироваться</a>
            </div>
        </form>

        <!-- Форма регистрации -->
        <form x-show="!showLogin" @submit.prevent="register" class="px-6 pb-6 space-y-4 transition-all duration-300">
            <!-- Логин -->
            <div class="space-y-1">
                <input type="text" name="username" placeholder="Логин" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <!-- Email -->
            <div class="space-y-2">
                <input type="email" name="email" placeholder="Email" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <!-- Телефон -->
            <div class="space-y-1">
                <input type="text" x-model="formattedPhone" @input="updateRawPhone($event)" @focus="focusInput($el)"
                    placeholder="+7 (999) 123-45-67" autocomplete="tel" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <!-- Пароль -->
            <div class="space-y-2">
                <input type="password" name="password" placeholder="Пароль" required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary-hover active:scale-95 transition-all shadow-md">
                Регистрация
            </button>

            <div class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
                Уже есть аккаунт?
                <a @click="showLogin = true" class="text-primary font-medium hover:underline cursor-pointer">Войти</a>
            </div>
        </form>
    </div>
</body>

</html>
