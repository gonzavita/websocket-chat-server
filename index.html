<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💬 Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9fb;
            --card: #ffffff;
            --text: #1c1c1e;
            --text-secondary: #636366;
            --primary: #0088cc;
            --primary-hover: #006ca1;
            --border: #e1e1e6;
            --sent: #d0ebff;
            --sent-text: #005a87;
            --received: #f0f2f5;
            --input-bg: #f0f2f5;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* === Авторизация === */
        .auth {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 40px;
            text-align: center;
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .auth h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .auth p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .auth input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            border-radius: 12px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .auth input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.2);
        }

        .auth button {
            width: 100%;
            padding: 16px;
            margin: 20px 0;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .switch-form {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .switch-form a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        /* === Основной интерфейс === */
        .app {
            display: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: var(--shadow);
            background: var(--card);
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chats {
            overflow-y: auto;
            flex: 1;
        }

        .chat-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .chat-item:hover {
            background: #f5f7fa;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .chat-avatar {
            width: 36px;
            height: 36px;
            font-size: 16px;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
        }

        .sent {
            align-self: flex-end;
            background: var(--sent);
            color: var(--sent-text);
        }

        .received {
            align-self: flex-start;
            background: var(--received);
            color: var(--text);
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .input-area button:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }

            .chat-info,
            .chat-preview {
                display: none;
            }

            .chat-header .chat-avatar {
                margin-left: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- === Страница входа/регистрации === -->
    <div class="auth" id="authScreen">
        <h1>💬 Messenger</h1>
        <p>Быстро, стильно и удобно</p>

        <!-- Форма входа -->
        <form id="loginForm" style="display: block;">
            <input type="text" name="username" placeholder="Логин или email" required />
            <input type="password" name="password" placeholder="Пароль" required />
            <button type="submit">Войти</button>
            <div class="switch-form">
                Нет аккаунта? <a id="toRegister">Зарегистрироваться</a>
            </div>
        </form>

        <!-- Форма регистрации -->
        <form id="registerForm" style="display: none;">
            <input type="text" name="username" placeholder="Логин" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Пароль" required />
            <button type="submit">Зарегистрироваться</button>
            <div class="switch-form">
                Уже есть аккаунт? <a id="toLogin">Войти</a>
            </div>
        </form>
    </div>

    <!-- === Основной интерфейс чата === -->
    <div class="app" id="chatApp">
        <div class="sidebar">
            <div class="sidebar-header">
                <div style="flex:1;">
                    <span>Чаты</span>
                </div>
                <div style="flex:2; position:relative;">
                    <input type="text" id="searchUsers" placeholder="Поиск..."
                        style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--border); font-size:14px;">
                    <div id="searchResults"
                        style="position:absolute; top:100%; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto; display:none; z-index:10;">
                    </div>
                </div>
                <div style="flex:1; text-align:right;">
                    <span id="logout" style="cursor:pointer;">Выход</span>
                </div>
            </div>

            <div class="chats" id="chatsList">
                <div class="chat-item" data-chat-id="1">
                    <div class="chat-avatar">A</div>
                    <div class="chat-info">
                        <div class="chat-name">Alice</div>
                        <div class="chat-preview">Привет! Как прошёл день?</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="chat-header">
                <div class="chat-avatar">A</div>
                <span id="chatHeader">Alice</span>
            </div>
            <div class="messages" id="messages">
                <div class="message received">Привет! Сегодня было много дел, но всё хорошо 😊</div>
                <div class="message sent">Рад слышать! А у меня выходной — отдыхаю.</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." />
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Переключение форм
        document.getElementById('toRegister').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        document.getElementById('toLogin').onclick = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        let currentUser = null;
        let currentChatId = null;

        // Вход
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('https://service-taxi31.ru/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    currentUser = result.user;
                    showChatApp();
                    loadChats();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (err) {
                alert('Сеть недоступна');
            }
        };

        // Регистрация
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('https://service-taxi31.ru/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('Регистрация успешна! Теперь войдите.');
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (err) {
                alert('Сеть недоступна');
            }
        };

        function showChatApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatApp').style.display = 'flex';
        }

        document.getElementById('logout').onclick = () => {
            currentUser = null;
            currentChatId = null;
            document.getElementById('chatApp').style.display = 'none';
            document.getElementById('authScreen').style.display = 'block';
        };

        async function loadChats() {
            if (!currentUser) return;
            try {
                const res = await fetch(`https://service-taxi31.ru/api/chats.php?action=list&user_id=${currentUser.id}`);
                const result = await res.json();
                const container = document.getElementById('chatsList');
                container.innerHTML = '';

                if (result.chats && result.chats.length > 0) {
                    result.chats.forEach(chat => {
                        const name = chat.name || (chat.members?.split(',')[0] || 'Чат');
                        const avatarText = name.charAt(0).toUpperCase();
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.dataset.chatId = chat.id;
                        div.innerHTML = `
                <div class="chat-avatar">${avatarText}</div>
                <div class="chat-info">
                  <div class="chat-name">${name}</div>
                  <div class="chat-preview">Начните переписку</div>
                </div>
              `;
                        div.onclick = () => openChat(chat.id, name);
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<div class="chat-item">Нет чатов</div>';
                }
            } catch (err) {
                console.error('Ошибка загрузки чатов:', err);
            }
        }
        // Поиск пользователей
        const searchInput = document.getElementById('searchUsers');
        const searchResults = document.getElementById('searchResults');

        searchInput.oninput = async () => {
            const q = searchInput.value.trim();
            if (q.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`https://service-taxi31.ru/api/search_users.php?user_id=${currentUser.id}&q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if (data.users && data.users.length > 0) {
                    searchResults.innerHTML = '';
                    data.users.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.style.padding = '10px 15px';
                        div.innerHTML = `
                    <div class="chat-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.username} <small style="color:${user.online ? 'green' : '#999'};">${user.online ? '🟢' : '⚪'}</small></div>
                    </div>
                `;
                        div.onclick = () => createChatWith(user.id, user.username);
                        searchResults.appendChild(div);
                    });
                    searchResults.style.display = 'block';
                } else {
                    searchResults.innerHTML = '<div style="padding:10px; color:#999; text-align:center;">Не найдено</div>';
                    searchResults.style.display = 'block';
                }
            } catch (err) {
                console.error('Ошибка поиска:', err);
            }
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.sidebar-header')) {
                searchResults.style.display = 'none';
            }
        });

        // Создать чат с пользователем
        async function createChatWith(interlocutorId, username) {
            try {
                const res = await fetch('https://service-taxi31.ru/api/chats.php?action=create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.id, interlocutor_id: interlocutorId })
                });
                const result = await res.json();

                if (result.success) {
                    searchInput.value = '';
                    searchResults.style.display = 'none';
                    loadChats();
                    setTimeout(() => openChat(result.chat_id, username), 500);
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (err) {
                alert('Не удалось создать чат');
            }
        }

        async function openChat(chatId, name) {
            currentChatId = chatId;
            document.getElementById('chatHeader').textContent = name;

            if (window.msgInterval) clearInterval(window.msgInterval);
            await loadMessages();

           window.msgInterval = setInterval(async () => {
                if (currentChatId) {
                    await loadMessages();
                }
            }, 5000); // раз в 5 секунд — меньше нагрузки


            // Ждём ID собеседника
            const interlocutorId = await getInterlocutorId(chatId);
            if (interlocutorId) {
                await updateStatus(interlocutorId);

                window.statusInterval = setInterval(async () => {
                    await updateStatus(interlocutorId);
                }, 10000);
            }
        }


        // Получить ID собеседника из участников чата
        async function getInterlocutorId(chatId) {
            try {
                const res = await fetch(`https://service-taxi31.ru/api/chat_participants.php?chat_id=${chatId}`);
                const data = await res.json();
                if (data.users && data.users.length === 2) {
                    const other = data.users.find(u => u.id != currentUser.id);
                    return other ? other.id : null;
                }
            } catch (err) {
                console.error('Ошибка загрузки участников:', err);
            }
            return null;
        }

        // Обновить статус собеседника
        async function updateStatus(userId) {
            try {
                const res = await fetch(`https://service-taxi31.ru/api/user_status.php?user_id=${userId}`);
                const data = await res.json();
                const statusText = data.online ? '🟢 Online' : `⚪ Был(а) ${formatTimeAgo(data.last_seen)}`;
                document.getElementById('chatHeader').textContent = `${data.username} (${statusText})`;
            } catch (err) {
                console.error('Ошибка статуса:', err);
            }
        }

        function formatTimeAgo(timestamp) {
            const now = new Date();
            const time = new Date(timestamp);
            const diff = Math.floor((now - time) / 1000);

            if (diff < 60) return 'только что';
            if (diff < 3600) return `${Math.floor(diff / 60)} мин назад`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} ч назад`;
            return `${Math.floor(diff / 86400)} дн назад`;
        }


        let lastMessageId = 0;

            async function loadMessages() {
                if (!currentChatId || !currentUser) return;

                try {
                    // Запрашиваем только новые сообщения
                    const res = await fetch(`https://service-taxi31.ru/api/messages.php?action=get&chat_id=${currentChatId}&last_id=${lastMessageId}`);
                    const text = await res.text();
                    console.log('Raw response:', text);

                    const result = JSON.parse(text);
                    const messagesContainer = document.getElementById('messages');

                    if (result.messages && result.messages.length > 0) {
                        // Фильтруем только новые
                        const newMessages = result.messages.filter(msg => msg.id > lastMessageId);

                        newMessages.forEach(msg => {
                            const div = document.createElement('div');
                            div.className = msg.sender_id == currentUser.id ? 'message sent' : 'message received';
                            div.textContent = msg.content;
                            messagesContainer.appendChild(div);
                        });

                        // Обновляем ID последнего сообщения
                        lastMessageId = Math.max(lastMessageId, ...result.messages.map(m => m.id));
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                } catch (err) {
                    console.error('Ошибка загрузки сообщений:', err);
                }
            }




        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId || !currentUser) return;

            try {
                const res = await fetch('https://service-taxi31.ru/api/messages.php?action=send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: currentChatId,
                        user_id: currentUser.id,
                        text: text
                    })
                });

                const result = await res.json();
                if (result.success) {
                    const messagesContainer = document.getElementById('messages');
                    const msg = document.createElement('div');
                    msg.className = 'message sent';
                    msg.textContent = result.message.message_text;
                    messagesContainer.appendChild(msg);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    input.value = '';
                    // Обновим список, чтобы подтянулся превью
                    loadChats();
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (err) {
                alert('Не удалось отправить сообщение');
            }
        };

        document.getElementById('messageInput').onkeydown = (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        };
    </script>

</body>

</html>
